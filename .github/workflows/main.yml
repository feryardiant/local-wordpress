name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  prepare:
    name: Prepare
    uses: projek-xyz/actions/.github/workflows/configure.yml@main
    secrets: inherit
    with:
      php-version: 8.1

    permissions:
      pull-requests: write
      contents: read

  run:
    name: with WP ${{ matrix.wp }} on PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: [prepare]

    env:
      DB_NAME: ${{ github.repository_owner }}
      DB_USER: ${{ github.repository_owner }}
      DB_PASS: secret
      PHP_VERSION: ${{ matrix.php }}
      WP_VERSION: ${{ matrix.wp }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.DB_PASS }}
          MYSQL_DATABASE: ${{ env.DB_NAME }}
          MYSQL_USER: ${{ env.DB_USER }}
          MYSQL_PASSWORD: ${{ env.DB_PASS }}
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    strategy:
      matrix:
        php: ['8.1']
        wp: ['5.9']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ vars.BUN_VERSION || '1.3.10' }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ needs.prepare.outputs.composer-cache-dir }}
          key: ${{ needs.prepare.outputs.composer-cache-key }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ needs.prepare.outputs.composer-cache-key }}-composer-

      - name: Install dependencies
        run: |
          composer update

      - name: Set up WordPress
        env:
          DB_HOST: 127.0.0.1:${{ job.services.mysql.ports['3306'] }}
          SITE_URL: http://localhost
          SITE_TITLE: WordPress Local
          SITE_ADMIN_USER: admin
          SITE_ADMIN_PASS: secret
          SITE_ADMIN_EMAIL: admin@example.com
          SITE_TIMEZONE: Asia/Jakarta
        run: |
          echo '::group::Download Core'
          vendor/bin/wp core download --version=${{ matrix.wp }}
          echo '::endgroup::'

          echo '::group::Configure Core'
          vendor/bin/wp config create \
            --dbhost=${DB_HOST} --dbname=${DB_NAME} \
            --dbuser=${DB_USER} --dbpass=${DB_PASS}
          echo '::endgroup::'

          echo '::group::Install Core'
          vendor/bin/wp core install \
            --url="${SITE_URL}" --title="${SITE_TITLE}" \
            --admin_user="${SITE_ADMIN_USER}" \
            --admin_password="${SITE_ADMIN_PASS}" \
            --admin_email="${SITE_ADMIN_EMAIL}" \
            --skip-email --allow-root
          echo '::endgroup::'

          # echo '::group::Set options'
          # vendor/bin/wp option update permalink_structure "/%postname%/"
          # vendor/bin/wp option update timezone_string "${SITE_TIMEZONE}"
          # echo '::endgroup::'

          # echo '::group::Install plugins'
          # vendor/bin/wp plugin install contact-form-7
          # echo '::endgroup::'

          echo '::group::Verify'
          ls -lah tests/stubs/wordpress
          vendor/bin/wp core is-installed
          echo '::endgroup::'

      # - name: Lint
      #   run: |
      #     vendor/bin/phpcs

      - name: Unit Test
        run: |
          vendor/bin/phpunit --coverage-text
